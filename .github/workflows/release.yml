name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v2.1.3, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required for creating releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all modules
        run: ./gradlew build

      - name: Collect addon JARs
        run: |
          mkdir -p release-jars
          find modules -path "*/build/libs/*.jar" -name "serverstats-addon-*.jar" -exec cp {} release-jars/ \;
          echo "Collected JARs:"
          ls -la release-jars/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## ServerStats Addons ${{ github.ref_name }}
            
            ### Included Addons
            - **ShopGUIPlus** - Tracks shop purchases and sales
            - **Votifier** - Tracks player votes
            - **PlayerPoints** - Tracks point transactions
            
            ### Installation
            1. Download the addon JAR(s) you want
            2. Place them in `plugins/ServerStats/addons/`
            3. Restart your server or run `/serverstats reload`
            
            ### Requirements
            - ServerStats plugin
            - The corresponding plugin for each addon (ShopGUIPlus, NuVotifier, etc.)
          files: release-jars/*.jar
          draft: false
          prerelease: false
          generate_release_notes: true
