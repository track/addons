name: Release

on:
  push:
    branches: [main]
    paths:
      - gradle.properties
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d '=' -f2 | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from gradle.properties"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check whether this version was already released
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists. Nothing to release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist yet. Proceeding with release."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        if: steps.tag_check.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: ./gradlew build --no-daemon

      - name: Bundle jars
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p dist
          find modules -path "*/build/libs/analyse-addon-*.jar" -exec cp {} dist/ \;
          cd dist && zip -j "analyse-addons-${{ steps.version.outputs.version }}.zip" analyse-addon-*.jar
          ls -la

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Analyse Addons ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            dist/analyse-addon-*.jar
            dist/analyse-addons-${{ steps.version.outputs.version }}.zip
